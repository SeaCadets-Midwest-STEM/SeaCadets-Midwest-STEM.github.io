<header class="site-header">
  <div class="site-header__inner">
    <a href="{{ .Site.BaseURL }}" class="site-header__brand" aria-label="{{ .Site.Title }} — Home">
      {{ .Site.Params.org_name | default .Site.Title }}
    </a>

    <button class="nav-toggle" aria-expanded="false" aria-controls="primary-nav" aria-label="Toggle navigation">
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
      <span class="nav-toggle__bar"></span>
    </button>

    <nav id="primary-nav" class="site-nav" aria-label="Primary navigation">
      <ul class="site-nav__list">
        {{- range .Site.Menus.main }}
        <li class="site-nav__item">
          <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
        </li>
        {{- end }}
        <li class="site-nav__item">
          <a href="{{ .Site.Params.seacadets_url }}" target="_blank" rel="noopener noreferrer">SeaCadets.org</a>
        </li>
      </ul>
    </nav>
  </div>
</header>
