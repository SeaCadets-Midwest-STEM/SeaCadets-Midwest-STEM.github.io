{{ define "main" }}

{{ partial "hero.html" . }}
{{ partial "breadcrumbs.html" . }}

<div class="section">
  <div class="container">
    {{ .Content }}

    {{ if .Pages }}
    <div class="card-grid">
      {{ range .Pages }}
      <article class="card">
        {{ with .Params.hero_image }}
        <img class="card__image" src="{{ . | relURL }}" alt="{{ $.Title }}">
        {{ end }}
        <div class="card__body">
          <h3 class="card__title"><a href="{{ .Permalink }}">{{ .Title }}</a></h3>
          <p class="card__excerpt">{{ .Summary }}</p>
          <div class="card__footer">
            <a href="{{ .Permalink }}" class="btn btn--navy">Read More</a>
          </div>
        </div>
      </article>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>

{{ end }}
