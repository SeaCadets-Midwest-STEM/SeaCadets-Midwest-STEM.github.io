baseURL = "https://seacadets-midwest-stem.github.io/SeaCadets-Midwest-STEM/"
languageCode = "en-us"
title = "Sea Cadets Midwest STEM"
theme = "seacadets-midwest"

[params]
  description = "STEM programs and training opportunities for U.S. Naval Sea Cadets in the Midwest region."
  org_name = "Sea Cadets Midwest STEM"
  seacadets_url = "https://www.seacadets.org"
  quarterdeck_info = "Register for trainings through Quarterdeck at https://www.seacadets.org using your training code."

[params.social]
  facebook = "https://www.facebook.com/usnscc"
  instagram = "https://www.instagram.com/americaseacadets"
  youtube = "https://www.youtube.com/@SeaCadetsUS"

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[caches]
  [caches.images]
    dir = ":cacheDir/images"

